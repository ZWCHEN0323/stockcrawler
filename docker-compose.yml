version: "3.9"

services:
  stock-crawler:
    build: .
    container_name: taiwan_stock_crawler
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "8000:8000"

